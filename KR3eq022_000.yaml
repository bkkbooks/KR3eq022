body:
  text: 神農嘗百草論淮南子云神農嘗百草一日七十毒豫嘗誦其書每至於此未始不嘆夫孟子所謂盡信書則不如無書夫神農立極之大聖也閔生民之不能以無疾故察夫物性之可以愈疾者以貽後人固不待乎物物必嘗而始知也苟待乎物物必嘗而始知則不足謂之生知之聖也以生知之聖言之則雖不嘗亦可知也設使其所知果有待乎必嘗則愈疾之功非疾不能以知之其神農衆疾俱備而歷試之乎況汙穢之藥不可嘗者其亦嘗乎且味固可以嘗而知其氣其性其行經主治及畏惡反忌之類亦可以嘗而知乎苟嘗其所可嘗而不嘗其所不可嘗不可嘗者既可知而可嘗者亦不必待乎嘗之而後知矣謂其不嘗不可也謂其悉嘗亦不可也然經於諸藥名下不著氣性等字獨以味字冠之者由藥入口惟味為先故也又藥中雖有玉石蟲獸之類其至衆者惟草為然故遂曰嘗百草耳豈獨嘗草哉夫物之有毒嘗而毒焉有矣豈中毒者日必七十乎設以其七十毒偶見於一日而記之則毒之小也固不死而可解毒之大也則死矣孰能解之亦孰能復生之乎先正謂淮南之書多寓言夫豈不信亢則害承乃制論豫讀內經六微旨論至於亢則害承乃制喟然嘆曰至矣哉其造化之樞紐乎王太僕發之於前劉河間闡之於後聖人之蘊殆靡遺矣然學者尚不能釋然得不猶有未悉之旨也歟謹按內經帝曰願聞地理之應六節氣位何如岐伯曰顯明之右君火之位也君火之右退行一步相火治之復行一步土氣治之復行一步金氣治之復行一步水氣治之復行一步木氣治之復行一步君火治之相火之下水氣承之水位之下土氣承之土位之下風氣承之風位之下金氣承之金位之下火氣承之君火之下陰精承之帝曰何也岐伯曰亢則害承乃制制生則化外列盛衰害則敗亂生化大病嘗觀夫陰陽五行之在天地間也高者抑之下者舉之強者折之弱者濟之蓋莫或使然而自不能不然也不如是則高者愈高下者愈下強者愈強弱者愈弱而乖亂之政日以極矣天地其能位乎雖然高也下也弱與強也亦莫或使然而自不能不然也故易也者造化之不可常也惟其不可常故神化莫能以測莫測故不息也可常則息矣亢則害承乃制者其莫或使然而自不能不然者歟夫太僕河間已發揮者茲不贅及其未悉之旨請推而陳之夫自顯明之右止君火治之十五句言六節所治之位也自相火之下止陰精承之十二句言地理之應乎歲氣也亢則害承乃制二句言抑其過也制生則化止生化大病四句言有制之常與無制之變也承猶隨也然不言隨而曰承者以下言之則有上奉之象故曰承雖謂之承而有防之之義存焉亢者過極也害者害物也制者克勝之也然所承也其不亢則隨之而已故雖承而不見既亢則克勝以平之承斯見矣然而迎之不知其所來迹之不知其所止固若有不可必者然可必者常存乎杳置恍惚之中而莫之或欺也河間曰已亢過極則反似勝已之化似也者其可以形質求哉故後篇厥陰所至為風生終為肅少陰所至為熱生終為寒之類其為風生為熱生者亢也其為肅為寒者制也又水發而為雹雪土發而飄驟之類其水發土發者亢也其雹雪飄驟者制也若然者蓋造化之常不能以無亢亦不能以無制焉耳夫前後二篇所主雖有歲氣運氣之殊然亢則害承乃制之道蓋無往而不然也惟其無往而不然故求之於人則五臟更相平也一臟不平所不勝平之五臟更相平非不亢而防之乎一臟不平所不勝平之非既亢而克勝之乎姑以心火而言其不亢則腎水雖心火之所畏亦不過防之而已一或有亢即起而克勝之矣餘臟皆然制生則化當作制則生化蓋傳寫之誤而釋之讀之者不覺求之不通遂並遺四句而弗取殊不知上二句止言亢而害害而制耳此四句乃害與制之外之餘意也苟或遺之則無以見經旨之周悉矣制則生化正與下文害則敗亂相對辭理俱順不勞曲説而自通制則生化者言有所制則六氣不至於亢而為平平則萬物生生而變化無窮矣化為生之盛故生先於化也外列盛衰者言六氣分布主治迭為盛衰昭然可見故曰外列害則敗亂生化大病者言既亢為害而無所制則敗壞乖亂之政行矣敗壞乖亂之政行則其變極矣其災甚矣萬物其有不病者乎生化指所生所化者言謂萬物也以變極而災甚故曰大病上生化以造化之用言下生化以萬物言以人論之制則生化猶元氣周流滋營一身凡五臟六腑四肢百骸九竅皆藉焉以為動靜云為之主生化大病猶邪氣恣橫正氣耗散凡五臟六腑四肢百骸九竅舉不能遂其運用之常也或以害為自害或以承為承襲或以生為自無而有化為自有而無或以二生化為一意或以大病為喻造化之機息此數者皆非也且夫人之氣也固亦有亢而自制者苟亢而不能自制則湯液針石導引之法以為之助若天地之氣其亢而自制者固復於平亢而不制者其孰助哉雖然造化之道苟變至於極則亦終必自反而復其常矣學者能本之太僕河間而參之此論則造化樞紐之詳亦庶矣乎然張戴人治法心要則曰假令水為母木為子當春旺之時冬令猶在即水亢也水亢極則木令不至矣木者繼冬而承水也水既亢則害其所承矣所以木無權也木無權則無以制土土既旺則水乃受制也土者繼長夏之令也水受土製熱克其寒也變而為濕此其權也又如火為母土為子當長夏之時暄令猶在即火亢也火既亢極則濕令不至矣濕者繼夏而承火也火既亢則害其所承矣所以濕無權也濕無權則無以制水水既旺則火乃受制也水者嚴冬之令也火受水制寒克其熱也變而為土濕土斯得其權也斯言也推之愈詳而違經愈遠矣或曰心要者他人成之蓋得於所聞之訛耳四氣所傷論素問生氣通天論篇曰春傷於風邪氣留連乃為洞泄夏傷於暑秋為咳瘧秋傷於濕上逆而咳發為痿厥冬傷於寒春必病溫陰陽應象論篇曰春傷於風夏生飧泄夏傷於暑秋必痎瘧秋傷於濕冬生咳嗽冬傷於寒春必病溫王啓玄注云風中於表則內應於肝肝氣乘脾故洞泄或飧泄夏暑已甚秋熱復收兩熱相攻則為痎瘧秋濕既勝冬水復旺水濕相得肺氣又衰故乘肺而為咳嗽其發為痿厥者蓋濕氣內攻於臟腑則咳逆外散於筋脈則痿弱也厥謂逆氣也冬寒且凝春陽氣發寒不為釋陽怫於中寒怫相持故為溫病傷寒論引素問後篇八句成無己注云當春之時風氣大行春傷於風風氣通於肝肝以春適旺風雖入之不能即發至夏肝衰然後始動風淫末疾則當發於四肢夏以陽氣外盛風不能外發故攻內而為飧泄當秋之時濕氣大行秋傷於濕濕則干於肺肺以秋適旺濕雖入之不能即發至冬肺衰然後濕始動也雨淫腹疾則當發為下利冬以陽氣內固濕氣不能下行故上逆而為咳嗽當夏之時暑氣大行夏傷於暑夏以陰為主內暑雖入之勢未能動及秋陰出而陽為內主然後暑動搏陰而為痎瘧當冬之時寒氣大行冬傷於寒冬以陽為主內寒雖入之勢未能動及春陽出而陰為內主然後寒動搏陽而為溫病王海藏曰木在時為春在人為肝在天為風當春之時發為溫令反為寒折是三春之月行三冬之令也以是知水太過矣水既太過金肅愈嚴是所勝者乘之而妄行也所勝者乘之則木虛明矣木氣既虛火令不及是所生者受病也故所不勝者侮之是以土來木之分變而為飧泄也所以病發於夏者以木絶於夏而土旺於夏濕本有下行之體故也不病於春者以春時風雖有傷木實當權故也暑季夏也季夏者濕土也君火持權不與之子暑濕之令不行也濕令不行則土虧矣所勝妄行木氣太過少陽旺也所生者受病則肺金不足所不勝者侮之故水得以來土之分土者坤也坤在申之分申為相火水入於土則水火相干水火相干則陰陽交爭故為寒熱兼木氣終見三焦是少陽相火合也少陽在濕土之分故為寒熱肺金不足灑淅寒熱此皆往來未定之氣也故為痎瘧不發於夏而發於秋者以濕熱在酉之分方得其權故也秋者清肅之氣收斂下行之體也為濕所傷是長夏之氣不與秋令也秋令不及所勝妄行故火得以炎上而剋金心火既刑于肺故肺氣逆而為咳所不勝者侮之木氣上行與火同德動而不息者也所生者受病故腎水虧也長夏已亢三焦之氣盛也命門者三焦之合也故迫腎水上行與脾土濕熱相合為疾因咳而動於脾之濕是以咳嗽有聲有涎不發於秋而發於冬者以其六陰之極肅殺始得其氣故也冬傷於寒者是冬行春令也當寒而溫火勝而水虧矣水既已虧則所勝妄行土有餘也所生受病木不足也所不勝者侮之火太過也火土合德濕熱相助故為溫病不病於冬而病於春者以其寒水居卯之分方得其權大寒之令復行於春腠理開泄少陰不藏房室勞傷辛苦之人陽氣泄於外腎水虧於內當春之月時強木長無以滋生化之原故為溫病耳夫春傷於風夏傷於暑冬傷於寒辭理皆順時字傷令字也獨秋傷於濕説作令字傷時字讀者不可疑也此四説皆母所亢而害其所承之子也若説秋字傷濕字其文與上三句相通其理與法不得相通矣大抵理與法通不必拘於文也或謂春傷於風是人為風所傷非也若是則止當頭痛惡風自汗何以言夏為飧泄哉今言春傷於風即是時傷令也明矣愚按此四傷諸家注釋皆不得經旨者蓋由推求太過故也孟子曰道在邇而求諸遠事在易而求諸難此之謂歟但只輕輕平易説去則經旨自明而無穿鑿之患矣何以言之夫風暑濕寒者天地之四氣也其傷於人人豈能於未發病之前預知其客於何經絡何臟腑何部分而成何病乎及其既發病然後可以診候始知其客於某經絡某臟腑某部分成某病耳注釋者苟誤因病始知病原之理則於此四傷不勞餘力自迎刃而解矣夫洞泄也痎瘧也咳與痿厥也溫病也皆是因其發動之時形診昭著乃逆推之而知其昔日致病之原為傷風傷暑傷濕傷寒耳非是初受傷之時能預定其今日必為此病也且夫傷於四氣有當時發病者有過時發病者有久而後發病者有過時之久自消散而不成病者何哉蓋由邪氣之傳變聚散不常及正氣之虛實不等故也且以傷風言之其當時而發則為惡風發熱頭疼自汗咳嗽喘促等病其過時與久而發則為癘風熱中寒中偏枯五臟之風等病是則洞泄飧泄者乃過時而發之中之一病耳因洞泄飧泄之病生以形診推之則知其為春傷風藏蓄不散而致此也苟洞泄飧泄之病未生孰能知其已傷風於前將發病於後邪假如過時之久自消散而不成病者人亦能知乎世有太素脈法雖或預知死亡之期然亦是因診之昭著而始能知耳夏傷暑為痎瘧冬傷寒為溫病意亦類此但秋傷濕上逆為咳嗽為痿厥其因病知原則與三者同其令行於時則與三者異夫春之風夏之暑冬之寒皆是本時之令也濕乃長夏之令何於秋言之蓋春夏冬每一時各有三月故其令亦各就其本時而行也若長夏則寄旺於六月之一月耳秋雖亦有三月然長夏之濕令每侵過於秋而行故曰秋傷於濕秋令為燥然秋之三月前近於長夏其不及為濕所勝其太過則同於火化其平氣則又不傷人此經所以於傷人止言風暑濕寒而不言燥也或問余曰五運六氣七篇所敘燥之為病甚多何哉余曰運氣七篇與素問諸篇自是兩書作於二人之手其立意各有所主不可混言王冰以為七篇參入素問之中本非素問元文也余今所推之義乃是素問本旨當自作一意看請陳四氣所傷所病之義夫風者春之令也春感之偶不即發而至夏邪既不散則必為疾其所以為洞泄者風蓋天地浩蕩之氣飛揚鼓舞神速不恆人身有此腸胃之職其能從容傳化泌別而得其常乎故水穀不及分別而並趍下以泄出也其為飧泄亦類此義説者謂春傷風為內通肝洞泄飧泄為木乘土又謂不發於春為邪避木旺發於夏為木衰邪動竊謂風既通肺則正當木班之時木極盛土極衰矣理宜乘旺而即發於春不宜反過時而發於夏也且夏火司權母能滋子何故不發於土衰極之時而反發於土受滋之時乎其説不通難以憑據暑者夏之令也夏感之偶不即發而至秋又傷於風與寒故為痎瘧也寒者冬之令也冬感之偶不即發而至春其身中之陽雖始為寒邪所郁不得順其漸升之性然亦必欲應時而出故發為溫病也若夫秋傷濕其令行於時之義上文已論之矣前篇所謂上逆而咳發為痿厥不言過時似是當時即發者但既與風暑寒三者並言則此豈得獨為即發者乎然經無明文終亦不敢比同後篇便斷然以為冬發病也雖然濕本長夏之令侵過於秋耳縱使即發亦近於過時而發者矣此當只以秋髮病為論濕從下受故干肺為咳謂之上逆夫肺為諸氣之主今既有病則氣不外運又濕滯經絡故四肢痿弱無力而或厥冷也後篇所謂冬生咳嗽既言過時則與前篇之義頗不同矣夫濕氣久客不散至冬而寒氣大行肺惡寒而或受傷故濕氣得以乘虛上侵於肺發為咳嗽也觀者以此意求之經旨其或著乎或者見素問於病溫痎瘧等間以必言之遂視為一定不易之辭而曰此必然之道嗟乎果可必耶果不可必耶素問之或言必或不言必者蓋不可膠為一定故也往往有泥於必之一字遂謂冬傷寒必當得病於春其冬傷寒而即病者反置而不論若此者可不謂之棄本逐末乎經中每有似乎一定不易之論而卻不可以為一定不易者如曰熱厥因醉飽入房而得熱中消中者皆富貴人也新沐中風則為首風如此之類豈一一皆然哉讀者當活法勿拘執也夫王啓玄之注雖未免泥於必字及未得經旨然卻不至太遠也若成無己之説則似太遠矣然猶未至於甚也至王海藏立論則推求過極欲異於人殊不知反穿鑿綴緝乖悖經旨有不可勝言者此先儒所謂如大軍遊騎出大遠而無所歸矣姑托成無己王海藏之説辨其甚者一二夫無己謂風淫末疾則當發於四肢雨淫腹疾則當發為下利竊謂則當二字決然之辭也春傷風遇夏之陽氣外盛而不能外發故攻內為飧泄此或若可通矣經曰木發無時倘風不傷於春而傷於他時不遇夏之陽氣外盛將外發乎將內攻乎況風屬陽與夏同氣果欲外出則當隨其散越之勢而出安有不能之理乎且風善行數變其為病非一豈獨能為四肢之疾乎所謂雨淫腹疾之義其不通亦如此至若夏傷暑秋為痎瘧者蓋因暑疾藏於皮膚之內腸胃之外復秋感風故疾作耳觀素問瘧論可見其與夏陰主內秋陽內主暑動搏陰何相干哉冬傷寒春為溫病者蓋因寒毒中人肌膚陽受所郁至春天地之陽氣外發其人身受郁之陽亦不能不出故病作也韓祗和謂冬時感寒鬱陽至春時再有感而後發余謂此止可論溫病之有惡寒者耳其不惡寒者則亦不為再感而後發也故仲景曰太陽病不發熱而渴不惡寒者為溫病觀傷寒論可見其與冬陽主內春陰內主寒動搏陽何相干哉乃若海藏則又以春傷風夏傷暑冬傷寒為時傷令秋傷濕為令傷時故於春傷風謂春行冬令而溫為寒折於夏傷暑謂暑者季夏季夏者濕土君火持權不與子而暑濕令不行於秋傷濕謂秋為濕所傷是長夏之氣不與秋令於冬傷寒謂冬行春令火勝水虧大寒之令復行於春陽氣外泄腎水內虧者病又謂溫病為濕熱相助而成又謂四時傷皆母亢而害所承之子籲何支離破碎徒費辭如此乎夫經中所言傷風傷暑之類甚多皆是以人受風暑等所傷為義未嘗有時傷令令傷時之意也若如海藏所言則瘧論所謂夏傷於暑秋傷於風與先傷於風後傷於寒等語其時傷令歟令傷時歟吾固知其不能不屈於此也且暑為夏令孰不知之今以暑為季夏為濕土得不怪哉夫冬果行春令人若感此則成冬溫病矣安得為春溫病乎其謂大寒之令復行於春溫病方作設使大寒之令不復行於春其溫病當作者遂不作乎況今之春為溫病者比比皆是未嘗見其必由大寒復行於春而後成也經曰亢則害承乃制其義謂已亢極則勝已者來制如火亢極則水來制之經所謂相火之下水氣承之水位之下土氣承之之類皆是勝已者為承今以亢為母承為子將求勝於經歟抑未達歟又如以制物者為所勝受制者為所不勝與經所謂氣有餘則制已所勝而侮所不勝及傳之於其所勝死於其所不勝之旨全反矣余如因時傷令令傷時之説委曲衍説者固不暇患辨也嗚呼豫非好斥前人之非蓋為其有害大義晦蝕經旨以誤後人故不敢諛順而默默耳然而僣逾之罪固已自知其不得辭矣但未知觀者以為何如張仲景傷寒立法考讀仲景之書當求其所以立法之意苟得其所以立法之意則知其書足以為萬世法而後人莫能加莫能外矣苟不得其所以立法之意則疑信相雜未免通此而礙彼也嗚呼自仲景以來發明其書者不可以數計然其所以立法之意竟未聞有表章而示人者豈求之而不得之歟將相循習而不求歟抑有之而余未之見歟余雖不敏僣請陳之夫傷於寒有即病者焉有不即病者焉即病者發於所感之時不即病者過時而發於春夏也即病謂之傷寒不即病謂之溫與暑夫傷寒溫暑其類雖殊其所受之原則不殊也由其原之不殊故一以傷寒而為稱由其類之殊故施治不得以相混以所稱而混其治宜乎貽禍後人以歸咎於仲景之法而委廢其太半也籲使仲景之法果貽禍於後人傷寒論不作可也使仲景之法果不貽禍於後人傷寒論其可一日缺乎後人乃不歸咎於已見之未至而歸咎於立法之大賢可謂溺井怨伯益失火怨燧人矣夫仲景法之祖也後人雖移易於窮終莫能越其矩度由莫能越而觀之則其法其方果可委廢太半哉雖然立言垂訓之士猶不免失於此彼碌碌者固無足誚矣夫惟立言垂訓之士有形乎著述之間其碌碌者當趑趄猶預之餘得不靡然從令爭先快睹而趍簡略之地乎夫其法其方委廢太半而不知返日惟簡便是趍此民生之所以無籍而仲景之心之所以不能別白矣嗚呼法也方也仲景專為即病之傷寒設不兼為不即病之溫暑設也後人能知仲景之書本為即病者設不為不即病者設則尚恨其法散落所存不多而莫能御夫粗工妄治之萬變果可憚煩而或廢之乎是知委廢太半而不覺其非者由乎不能得其所以立法之意故也今人雖以治傷寒法治溫暑亦不過借用耳非仲景立法之本意也猶六書假借雖移易於窮終非造字之初意夫仲景立法天下後世之權衡也故可借焉以為他病用雖然豈特可藉以治溫暑而已凡雜病之治莫不可借也今人因傷寒治法可藉以治溫暑遂謂其法通為傷寒溫暑設籲此非識流而昧原者歟苟不余信請以證之夫仲景之書三陰經寒證居熱證什之七八彼不即病之溫暑但一於熱耳何由而為寒哉就三陰寒證而詳味之然後知余言之不妄或者乃謂三陰寒證本是雜病為王叔和增入其中又或謂其證之寒蓋由寒藥誤治而致若此者皆非也夫叔和之增入者辨脈平脈與可汗可下等諸篇而已其六經病篇必非叔和所能贊辭也但厥陰經中下利嘔噦諸條卻是叔和因其有厥逆而附遂並無厥逆而同類者亦附之耳至若以藥誤治而成變證則惟太陰為多縱使三陰證亦或有寒藥誤治而變寒者然豈應如是之衆乎夫惟後人以仲景書通為傷寒溫暑設遂致諸溫劑皆疑焉而不敢用韓只和雖覺桂枝湯之難用但謂今昔之世不同然未悟仲景書本為即病之傷寒設也且其著微旨一書又純以溫暑作傷寒立論而即病之傷寒反不言及此已是捨本徇末全不能窺仲景藩籬又以夏至前胸膈滿悶嘔逆氣塞腸鳴腹痛身體拘急手足逆冷等證視為溫暑謂與仲景三陰寒證脈理同而證不同遂別立溫中法以治夫仲景所敘三陰寒證乃是冬時即病之傷寒故有此證今欲以仲景所敘三陰寒證求對於春夏溫暑之病不亦惛乎雖然祗和未悟仲景立法本旨而又適當溫暑病作之際其為惑也固宜以余觀之其胸膈滿悶嘔逆氣寒等證若非內傷冷物則不正暴寒所中或過服寒藥所變或內外俱傷於寒之病也且祗和但曰寒而當溫然未嘗求其所以為寒之故能求其故則知溫暑本無寒證矣改之仲景書雖有陰毒之名然其所敘之證不過面目青身痛如被杖咽喉痛而已並不言陰寒極甚之證況其所治之方亦不過升麻甘草當歸鱉甲而已並不用大溫大熱之藥是知仲景所謂陰毒者非陰寒之病乃是感天地惡毒異氣入於陰經故曰陰毒耳後之論者遂以為陰寒極甚之證稱為陰毒乃引仲景所敘面目青身痛如被杖咽喉痛數語並而言之卻用附子散正陽散等藥以治竊謂陰寒極甚之證固亦可名為陰毒然終非仲景所以立名之本意觀後人所敘陰毒與仲景所敘陰毒自是兩般豈可混論後人所敘陰毒亦只是內傷冷物或不正暴寒所中或過服寒藥所變或內外俱傷於寒而成耳非天地惡毒異氣所中者也朱奉議作活人書纍數萬言於仲景傷寒論多有發明其傷寒即入陰經為寒證者諸家不識而奉議識之但惜其亦不知仲景專為即病者立法故其書中每每以傷寒溫暑混雜議論竟無所別況又視傷寒論為全書遂將次傳陰經熱證與即入陰經寒證牽合為一立説且謂大抵傷寒陽明證宜下少陰證宜溫而於所識即入陰經之見又未免自相悖矣夫陽明證之宜下者固為邪熱入胃其少陰證果是傷寒傳經熱邪亦可溫乎況溫病暑病之少陰尢不可溫也自奉議此説行而天下後世蒙害者不無矣逮夫成無己作傷寒論注又作明理論其表章名義纖悉不遺可謂善羽翼仲景者然即入陰經之寒證又不及朱奉議能識況即病立法之本旨乎宜其莫能知也惟其莫知故於三陰諸寒證止隨文解義而已未嘗明其何由不為熱而為寒也至於劉守真出亦以溫暑作傷寒立論而遺即病之傷寒其所處辛涼解散之劑固為昧者有中風傷寒錯治之失而立蓋亦不無桂枝麻黃難用之惑也既惑於此則無由悟夫仲景立桂枝麻黃湯之有所主用桂枝麻黃湯之有其時矣故其原病式有曰夏熱用麻黃桂枝之類熱藥發表須加寒藥不然則熱甚發黃或斑出矣此説出於龐安常而朱奉議亦從而和之殊不知仲景立麻黃湯桂枝湯本不欲用於夏熱之時也苟悟夫桂枝麻黃湯本非治溫暑之劑則群疑冰泮矣何也夫寒之初客於表也閉腠理郁陽氣而為熱故非辛溫之藥不能開腠理以泄其熱此麻黃湯之所由立也至於風邪傷表雖反疏腠理而不能閉然邪既客表則表之正氣受傷而不能流通故亦發熱也必以辛甘溫之藥發其邪則邪去而腠理自密矣此桂枝湯之所由立也其所以不加寒藥者蓋由風寒在表又當天令寒冷之時而無所避故也後人不知仲景立法之意故有惑於麻黃桂枝之熱有犯於春夏之司氣而不敢用於是有須加寒藥之論夫欲加寒藥於麻黃桂枝湯之中此乃不悟其所以然故如此耳若仲景為溫暑立方必不如此必別有法但惜其遺佚不傳致使後人有多岐之患若知仲景傷寒論專為即病傷寒作則知麻黃桂枝所以宜用之故除傳經熱證之外其直傷陰經與太陽不鬱熱即傳陰經諸寒證皆有所歸著而不復疑為寒藥誤下而生矣若乃春夏有惡風惡寒純類傷寒之證蓋春夏暴中風寒之新病非冬時受傷過時而發者不然則或是溫暑將發而復感於風寒或因感風寒而動乎久郁之熱遂發為溫暑也仲景曰太陽病發熱而渴不惡寒者為溫病觀此則知溫病不當惡寒而當渴其惡寒而不渴者非溫病矣仲景雖不言暑病然暑病與溫病同但復過一時而加重於溫病耳其不惡寒而渴則無異也春夏雖有惡風惡寒表證其桂枝麻黃二湯終難輕用勿泥於發表不遠熱之語也於是用辛涼解散庶為得宜苟不慎而輕用之誠不能免夫狂躁斑黃衄血之變而亦無功也雖或者行桂枝麻黃於春夏而效乃是因其辛甘發散之力偶中於萬一斷不可視為常道而守之今人以敗毒散參蘇飲通解散百解散之類不問四時中風傷寒一例施之雖非至正之道較之不慎而輕用麻黃桂枝於春夏以致變者則反庶幾然敗毒散等若用於春夏亦止可治暴中風寒之證而已其冬時受傷過時而發之溫病暑病則不宜用也用則非徒無益亦反害之矣縱或有效亦是偶然彼冬時傷寒用辛涼發表而或效者亦偶然也凡用藥治病其既效之後須要明其當然與偶然能明其當然與偶然則精微之地安有不至者乎惟其視偶然為當然所以循非踵弊莫之能悟而病者不幸矣若夫仲景於三陰經每用溫藥正由病之所必須與用之有其時耳余有別論茲不再具若概以三陰寒證視為雜病而外之得無負於仲景濟人利物之至仁而誤後世乎自近代先覺不示傷寒溫暑異治之端緒但一以寒涼為主而諸溫熱之劑悉在所略致使後之學者視仲景書欲仗焉而不敢以終決欲棄焉則猶以為立法之祖而莫能外甚則待為文具又甚則束之高閣而謂其法宜於昔而不宜於今由治亂動靜之殊治靜屬水亂動屬火故其溫熱之藥不可用於今屬火之時也噫斯言也其果然耶否耶但能明乎仲景本為即病者設法則桂枝麻黃自有所用諸溫熱之劑皆不可略矣若謂仲景法不獨為即病者設則凡時行及寒疫溫瘧風溫等病亦通以傷寒六經病諸方治之乎傷寒例曰冬溫之毒與傷寒大異為治不同又曰寒疫與溫及暑病相似但治有殊耳是則溫暑及時行寒疫溫瘧風溫等仲景必別有治法今不見者亡之也觀其所謂為治不同所謂溫瘧風溫溫毒溫疫脈之變證方治如説豈非亡其法乎決不可以傷寒六經病諸方通治也夫素問謂人傷於寒則為病熱者言常而不言變也仲景謂或熱或寒而不一者備常與變而弗遺也仲景蓋言古人之所未言大有功於古人者雖欲偏廢可乎叔和搜採仲景舊論之散落者以成書功莫大矣但惜其既以自己之説混於仲景所言之中又以雜脈雜病紛紜並載於卷首故使玉石不分主客相亂若先備仲景之言而次附己説明書其名則不致惑於後人而纍仲景矣昔漢儒妝拾殘編斷簡於秦火之餘加以傳注後之議者謂其功過相等叔和其亦未免於後人之議歟余嘗欲編類其書以傷寒例居前而六經病次之相類病又次之瘥後病又次之診察治法治禁治誤病解未解等又次之其雜脈雜病與傷寒有所關者採以附焉其與傷寒無相關者皆刪去如此庶幾法度純一而玉石有分主客不亂矣然有志未暇姑敘此以俟他日傷寒溫病熱病説有病因有病名有病形辨其因正其名察其形三者俱當始可以言治矣一或未明而曰不誤於人吾未之信也且如傷寒此以病因而為病名者也溫病熱病此以天時與病形而為病名者也由三者皆起於感寒或者通以傷寒稱之夫通稱傷寒者原其因之同耳至於用藥則不可一例而施也何也夫傷寒蓋感於霜降後春分前然不即發鬱熱而發於春夏者也傷寒即發於天令寒冷之時而寒邪在表閉其腠理故非辛甘溫之劑不足以散之此仲景桂枝麻黃等湯之所以必用也溫病熱病後發於天令暄熱之時怫熱自內而達於外郁其腠理無寒在表故非辛涼或苦寒或酸苦之劑不足以解之此仲景桂枝麻黃等湯獨治外者之所以不可用而後人所處水解散大黃湯千金湯防風通聖散之類兼治內外者之所以可用也夫即病之傷寒有惡風惡寒之證者風寒在表而表氣受傷故也後發之溫病熱病有惡風惡寒之證者重有風寒新中而表氣亦受傷故也若無新中之風寒則無惡風惡寒之證故仲景曰太陽病發熱而渴不惡寒者為溫病溫病如此則知熱病亦如此是則不渴而惡寒者非溫熱病矣然或有不因新中風寒亦見惡風惡寒之證者蓋病人表氣本虛熱達於表又重傷表氣故不禁風寒非傷風惡風傷寒惡寒也但衛虛則惡風榮虛則惡寒耳且溫病熱病亦有先見表證而後傳裡者蓋怫熱自內達外熱鬱腠理不得外泄遂復還里而成可攻之證非如傷寒從表而始也或者不悟此理乃於春夏溫病熱病而求浮緊之脈不亦疏乎殊不知緊為寒脈有寒邪則見之無寒邪則不見也其溫病熱病或見脈緊者乃重感不正之暴寒與內傷過度之冷食也豈其本然哉又或者不識脈形但見弦便呼為緊斷為寒而妄治蓋脈之盛而有力者每每兼弦豈可錯認為緊而斷為寒夫溫病熱病之脈多在肌肉之分而不甚浮且右手反盛於左手者誠由怫熱在內故也其或左手盛或浮者必有重感之風寒否則非溫病熱病自是暴感風寒之病耳凡溫病熱病若無重感表證雖間見而里病為多故少有不渴者斯時也法當治裡熱為主而解表兼之亦有治里而表自解者余每見世人治溫熱病雖誤攻其里亦無大害誤發其表變不可言此足以明其熱之自內達外矣其間有誤攻裡而致大害者乃春夏暴寒所中之疫證邪純在表未入於裡故也不可與溫病熱病同論夫惟世以溫病熱病混稱傷寒故每執寒字以求浮緊之脈以用溫熱之藥若此者因名亂實而戕人之生名其可不正乎又書方多言四時傷寒故以春夏之溫病熱病與秋冬之傷寒一類視之而無所別夫秋冬之傷寒真傷寒也春夏之傷寒寒疫也與溫病熱病自是兩塗豈可同治籲此弊之來非一日矣歷考方書並無救弊之論每每雷同良可痛哉雖然傷寒與溫病熱病其攻裡之法若果是以寒除熱固不必求異其發表之法斷不可不異也況傷寒之直傷陰經與太陽雖傷不及鬱熱即傳陰經為寒證而當溫者又與溫病熱病大不同其可妄治乎或者知一不知二故謂仲景發表藥今不可用而攻裡之藥乃可用嗚呼其可用不可用之理果何在哉若能辨其因正其名察其形治法其有不當者乎彼時行不正之氣所作及重感異氣而變者則又當觀其何時何氣參酌傷寒溫熱病之法損益而治之尤不可例以仲景即病傷寒藥通治也傷寒三陰病或寒或熱辨嘗讀張仲景傷寒論於太陰有曰自利不渴者屬太陰以其臟有寒故也當溫之宜服四逆輩於少陰有曰少陰病得之一二日口中和其背惡寒者當灸之附子湯主之少陰病身體痛手足寒骨節痛脈沉者附子湯主之少陰病下利白通湯主之少陰病下利脈微者與白通湯利不止厥逆無脈乾嘔煩者白通加豬膽汁湯主之少陰下利清穀裡寒外熱手足厥逆脈微欲絶身反不惡寒其人面赤色或腹痛或乾嘔或咽痛或利止脈不出者通脈四逆湯主之少陰病脈沉者急溫之宜四逆湯於厥陰有曰手足厥寒脈細欲絶者當歸四逆湯主之大汗若大下利而厥冷者四逆湯主之觀仲景此論則傷寒三陰必有寒證而宜用溫熱之劑也及讀劉守真之書有曰傷寒邪熱在表腑病為陽邪熱在裡臟病為陰俗妄謂有寒熱陰陽異證誤人久矣寒病有矣非汗病之謂也寒病止為雜病終莫能為汗病且造化汗液之氣者乃陽熱之氣非陰寒之所能也雖仲景有四逆湯證是治表熱里和誤以寒藥下之太早表熱入里下利不止及或表熱裡寒自利急以四逆溫里利止里和急解其表也故仲景四逆湯證復有承氣湯下之者由是傷寒汗病經直言熱病而不言寒也經言三陰證者邪熱在臟在裡以臟與里為陰當下熱者也素問論傷寒熱病有二篇名曰熱竟無寒理兼素問並靈樞諸篇運氣造化之理推之則為熱病誠非寒也觀守真此論則傷寒無問在表在裡與夫三陽三陰皆一於為熱而決無或寒者矣兩説不同其是非之判必有一居此者由是彼此反復究詰其義而久不能得雖至神疲氣耗不捨置者自謂此是傷寒大綱領此義不明則千言萬語皆未足以為後學式況戕賊民生何有窮極也哉意謂成無己之注必有所發明者遂因而求之然亦止是隨文而略釋之竟不明言何由為熱何由為寒之故此非其不欲言也蓋止知傷寒皆是傳經故疑於六經所傳俱為熱證而熱無變寒之理遂不敢別白耳以寒為本臟之寒歟安得當熱邪傳裡入深之時反獨見寒而不見熱者且所用溫熱藥能不助傳經之熱邪乎以寒為外邪之寒歟則在三陽以成熱矣豈有傳至三陰而反為寒哉成氏能潛心乎此則必悟其所以然矣自仲景作傷寒論以來靡或遺之而弗宗至於異同之論興而漁者走淵木者走山矣宜乎後人不能決於似是而非之際故或謂今世並無真傷寒病又或以為今人所得之病俱是內傷又昧者至謂傷寒論中諸溫藥悉為傳經熱邪而用者以三陰經屬陰故也又其太謬者則曰論中凡有寒字皆當作熱字看嗚呼末流之弊一至此乎於是澄心靜慮以涵泳之一旦劃然若有所悟者然亦未敢必其當否也姑陳之以從有道之正夫三陽之病其寒邪之在太陽也寒鬱其陽陽不暢而成熱陽雖人身之正氣既鬱則為邪矣用麻黃髮表以逐其寒則腠理通而鬱熱泄故汗而愈苟或不汗不解其熱不得外泄則必里入故傳陽明傳少陽而或入腑也若夫三陰之病則或寒或熱者何哉蓋寒邪之傷人也或有在太陽經鬱熱然後以次而傳至陰經者或有太陽不傳陽明少陽而便傳三陰經者或有寒邪不從陽經而始直傷陰經者或有雖從太陽而始不及鬱熱即入少陰而獨見少陰證者或有始自太陽即入少陰而太陽不能以無傷者或有直傷即入而寒便變熱及始寒而終熱者其鬱熱傳陰與變便變熱則為熱證其直傷陰經及從太陽即入少陰則為寒證其太陽不能無傷則少陰脈證而兼見太陽標病其始為寒而終變熱則先見寒證而後見熱證此三陰之病所以或寒或熱也苟即三陰經篇諸條展轉玩繹以求之理斯出矣夫其或傳經或直傷或即入或先寒後熱者何也邪氣暴卒本無定情而傳變不常故耳故經曰邪之中人也無有常或中於陽或中於陰夫守真者絶類離倫之士也豈好為異説以駭人哉蓋由其以溫暑為傷寒而仲景之方每不與溫暑對故略乎溫熱之劑而例用寒涼由其以傷寒一斷為熱而無寒故謂仲景四逆湯為寒藥誤下表熱里和之證及為表熱裡寒自利之證而立又謂溫里止利急解其表又謂寒病止為雜病嗟乎仲景傷寒論專為中而即病之傷寒作不兼為不即病之溫暑作故每有三陰之寒證而溫熱之劑之所以用也以病則寒以時則寒其用之也固宜後人不知此意是以愈求愈遠愈説愈鑿若知此意則猶庖丁解牛動中肯綮矣且如寒藥誤下而成裡寒者固不為不無矣不因寒藥誤下而自為裡寒者其可謂之必無乎殊不知陰經之每見寒證者本由寒邪不由陽經直傷於此與夫雖由太陽而始不及鬱熱即入於此而致也雖或有因寒藥誤下而致者蓋亦甚少仲景所用諸溫熱之劑何嘗每為寒藥誤下而立況表裡寒之證亦何嘗每有急解其表之文乎夫裡寒外熱之證乃是寒邪入客於內迫陽於外或是虛陽之氣自作外熱之狀耳非真熱邪所為也觀仲景於裡寒外熱之證但以溫藥治裡寒而不治外熱則知其所以為治之意矣若果當急解其表豈不於裡和之後明言之乎且三陰寒病既是雜病何故亦載於傷寒論以惑後人乎其厥陰病篇諸條之上又何故每以傷寒二字冠之乎夫內經所敘三陰病一於為熱者言其常也仲景所敘三陰病兼乎寒熱者言其變也並行而不相悖耳後人謂傷寒本無寒證得非知常而不知變歟然世之恪守局方好用溫熱劑者乃反能每全乾寒證無他其守彼雖偏治此則是學者能知三陰固有寒邪所為之證則仲景創法之本意可以瞭然於心目之間而不為他説所奪矣或曰傷寒之病必從陽經鬱熱而傳三陰今子謂直傷陰經即入陰經而為寒證其何據乎豫曰據夫仲景耳仲景曰病發熱惡寒者發於陽也無熱惡寒者發於陰也發於陽者七日愈發於陰者六日愈夫謂之無熱惡寒則知其非陽經之鬱熱矣謂之發於陰則知其不從陽經傳至此矣謂之六日愈則知其不始太陽而止自陰經發病之日為始數之矣仲景又曰傷寒一二日至四五日而厥者必發熱傷寒病厥五日熱亦五日設六日當復厥不厥者自愈傷寒厥四日熱反三日復厥五日其病為進夫得傷寒未為熱即為厥者豈亦由傳經入深之熱邪而致此乎今世人多有始得病時便見諸寒證而並無或熱者此則直傷陰經即入陰經者也苟不能究夫仲景之心但執凡傷於寒則為病熱之語以為治其不夭人天年者幾希矣陽虛陰盛陽盛陰虛論難經曰傷寒陽虛陰盛汗出而愈下之即死陽盛陰虛汗出而死下之而愈嗟乎其傷寒汗下之樞機乎夫邪之傷於人也有淺深焉淺則居表深則入里居表則閉腠理發怫熱見惡寒惡風頭痛等證於斯時也惟辛溫解散而可愈入里則為燥屎作潮熱形狂言譫語大渴等證於斯時也惟鹹寒攻下而可平夫寒邪外客非陰盛而陽虛乎熱邪內熾非陽盛而陰虛乎汗下一瘥生死反掌籲是言也謂之傷寒汗下樞機其不然歟惜乎釋者旁求厥義滋隱外臺祕要曰此陰陽指身之表裡言病者為虛不病者為盛表病里和是陽虛陰盛也表和里病是陽盛陰虛也竊意陰陽之在人均則寧偏則病無過不及之謂均過與不及之謂偏盛則過矣虛則不及矣其可以盛為和乎故內經云邪氣盛則實精氣奪則虛且謂陽虛當汗陰虛當下乃遺邪氣而反指正氣為言得無晦乎傷寒微旨曰此陰陽指脈之尺寸言尺脈實大寸脈短小名陰盛陽虛可汗寸脈實大尺脈短小名陽盛陰虛可下苟汗證已具而脈未應必待尺脈力過於寸而後行下證已具而脈未應必待寸脈力過於尺而後用竊意越人設難以病不以脈其所答也何反以脈不以病乎且脈固以候病也倘汗下之證已急不可稍緩待脈應而未應欲不待則惑於心欲待之則慮其變二者之間將從病歟將從脈歟吾不得無疑於此也或詰豫曰仲景傷寒論引此而繼以桂枝下咽陽盛則斃矛氣入胃陰盛以亡之語夫桂枝表藥承氣里藥反則為害是固然矣然麻黃湯亦表藥也其不言之何歟且子以陰盛為寒邪寒邪固宜用麻黃也今反舉桂枝又何歟豫曰何不味仲景之言乎其曰凡傷寒之病多從風寒得之又曰脈浮而緊浮則為風緊則為寒又桂枝湯條而曰嗇嗇惡寒淅淅惡風麻黃湯條而曰惡風夫風寒分言則風陽而寒陰風苟行於天地嚴凝凜洌之時其得謂之陽乎是則風寒常相因耳故桂枝麻黃皆溫劑也以溫劑為治足以見風寒之俱為陰邪矣但傷衛則桂枝傷榮則麻黃榮衛雖殊其為表則一耳仲景此言但以戒汗下之誤為主不為榮衛設也舉桂枝則麻黃在其中矣所謂陽盛即斃者是言表證已罷而里證既全可攻而不可汗所謂陰盛以亡者是言里證未形而表證獨具可汗而不可攻由是觀之則越人仲景之本旨庶乎暢然於其中矣傷寒三百九十七法辨余自童時習聞此言以為傷寒治法如是之詳且備也及考之成無己注本則所謂三百九十七法者茫然不知所在於是詢諸醫流亦不過熟誦此句而已欲其條分縷析以實其數則未遇其人遂乃反覆而推尋之以有論有方諸條數之則不及其數以有論有方有論無方諸條通數之則過其數除辨脈法平脈法並傷寒例及可汗不可汗可吐不可吐可下不可下諸篇外止以六經病篇中有論有方有論無方諸條數之則亦不及其數以六經病篇及痓濕暍霍亂陰陽易瘥後勞復病篇中有論有方有論無方諸條數之則亦過其數至以六經病痓濕暍霍亂陰陽易瘥後勞復篇有論有方諸條數之則又太少矣竟不能決欲以此句視為後人無據之言而不從則疑其或有所據而或出仲景叔和而弗敢廢欲尊信而必從之則又多方求合而莫之遂宋林億等校正傷寒論其序曰今校定張仲景傷寒論十卷總二十篇證外合三百九十七法余於是就其十卷二十二篇而求之其六經篇霍亂篇陰陽易瘥後勞復篇中有方治諸條以數為計又重載於各篇之前又謂疾病至急倉卒難尋復重集諸可與不可方治分為八篇亦以數為計繼於陰陽易瘥後勞復篇之後其太陽上篇注曰一十六法太陽中篇注曰六十六法太陽下篇注曰三十九法陽明篇注曰四十四法少陽篇不言法太陰篇注曰三法少陰篇注曰二十三法厥陰篇注曰六法不可發汗篇注曰一法可發汗篇注曰四十一法發汗後篇注曰二十五法可吐篇注曰二法不可下篇注曰四法可下篇注曰四十四法汗吐下後篇注曰四十八法以其所注之數通計之得三百八十七法然少陽篇有小柴胡湯一法其不言者恐脫之也又可吐篇卻有五法其止言二法者恐誤也並此脫誤四法於三百九十七法之中亦僅得三百九十一法耳較之序文之説猶欠六法乃參之脈經其可汗可吐等篇外比傷寒論又多可溫可灸可刺可水可火不可刺不可灸不可水不可火諸篇欲以此補其所欠則又甚多而不可用元泰定間程德齋又作傷寒鈐法其自序曰若能精究是編則知六經傳變三百九十七法在於指掌矣又曰六經二百一十一法霍亂六法陰陽易瘥後勞復六法痓濕暍九法不可汗二十六法宜汗四十一法不可吐五法不可下五法可汗五法可吐五法余亦以其説通計之卻止得三百一十八法於三百九十七法中尚欠七十八法觀其序文乃如彼考其所計乃如此則知其猶未能灼然以得其實數而無疑也故下文細數中止重敘六經霍亂痓濕暍陰陽易瘥後勞復諸法而已彼可汗不可汗等諸法再不重敘也近批點傷寒論者何不考其非乃一宗其所鈐字號而不敢少易乎余由是屏去其説但即論之本文寢食與俱以綢繹之一旦豁然始悟其所計之數於理不通而非仲景叔和之説矣夫傷寒論仲景之所作也至叔和時已多散落雖叔和搜採成書終不能復其舊然則今之所傳者非全書也明矣後之昧者乃不察此必欲以全書視之為鈐為括斷之曰某經幾證某經幾證以謂傷寒治法略無餘蘊矣殊不知其間有論無方者甚多至若前篇引內經所敘六經病證除太陽少陰證為後篇所有外其陽明篇無目疼少陽篇言胸脅滿而不言痛太陽篇無嗌乾厥陰篇無囊縮若此者非皆本無也必有之而脫之耳雖然為鈐括者膠柱調瑟但知叔和之重載而莫知其所以重載之意也夫叔和既撰次於摉採之餘復重載各篇方治並諸可與不可方治者非他不過慮人惑於紛亂故示之以簡便而已林億乃弗解其意遂不問重與不重一概通數之以立總目何不觀重載八篇之中其方治者止有一十五條為六經篇之所無其餘一百五十三條皆六經篇已數過者安有一法而當兩數之理乎雖程德齋去取與林億頗異然亦五十步笑百步耳其不重數發汗後並吐汗下後諸法固為是矣至於宜汗四十一法卻又俱是一法當兩數者與林億所計何以異哉推原其意似亦不見林億所計細數止聞三百九十七法之目遂自就論中尋而數之欲以實其總數然而卒不能實故為此含糊之説以欺後人反又不逮林億所言也竊嘗思之縱使三百九十七法之言不出於林億等而出於億之前亦不足用此言既出則後之聞者必當覆其是非以歸於正而乃遵守聽從以為千載不易之定論悲夫余今於三百九十七法內除去重復者與無方治者止以有方治而不重復者計之得二百三十八條並以治字易法字而曰二百三十八治如此則庶或可通也若以法言則仲景一書無非法也豈獨有方者然後為法哉且如論證論脈與夫諄諄教戒而使人按之以為望聞問切之準則者其可謂之法乎其不可謂之法乎雖然六經之外諸條其二家去取不同固不必辨然其於六經之中尢每有悖理而不通者姑陳一二如太陽病三日已發汗若吐若下若溫針仍不解者此為壞病桂枝不中與也觀其脈證知犯何逆隨證治之桂枝本為解肌若其人脈浮緊發熱汗不出者不可與之也常須識此勿令誤也若酒客病不可與桂枝湯得之則嘔以酒客不喜甘故也喘家作桂枝湯加厚朴杏子佳凡服桂枝湯吐者其後必吐膿血也林億所校本則自太陽病止勿令誤也為一法自若酒客病止杏子佳為一法自凡服桂枝湯止吐膿血也則為證不為法程德齋鈐法則自太陽病止隨證治之為一法自桂枝本為解肌止必吐膿血也為一法又林億本於病脅下素有痞連在臍旁痛引少腹入陰筋者此名臟結死一條則數為一法於其餘死不治者則皆不數程德齋鈐法於陽明病下血譫語者此為熱入血室但頭汗出者刺期門隨其實而瀉之濈然汗出愈一條則不數而太陽刺肝俞肺俞期門諸條卻又數之而弗遺余如兩條同類一云當汗而無方一云當汗而有方則取其有方者而略其無方者又如當取而不取不當取而取者蓋亦甚多不可悉舉若此者悖理不通二家皆所不免所謂楚固失矣齊亦未為得也苟熟玩論之本文以較其言則罅漏出矣傷寒四逆厥辨成無己注傷寒論有云四逆者四肢不溫也厥者手足冷也傷寒邪在三陽則手足必熱傳到太陰手足自溫至少陰則邪熱漸深故四肢逆而不溫及至厥陰則手足厥冷是又甚於逆經曰少陰病四逆其人或咳或悸或小便不利或腹中痛或泄痢下重者四逆散主之方用柴胡枳實芍藥甘草四者皆寒冷之物而專主四逆之疾是知四逆非虛寒之證也四逆與厥相近而非經曰諸四逆厥者不可下是四逆與厥有異也籲斯言也所謂彌近理而大亂真者歟竊嘗考之仲景言四逆與厥者非一或曰四逆或曰厥或曰厥逆或曰厥冷或曰厥寒或曰手足逆冷或曰手足厥逆或曰手足厥冷或曰手足厥逆冷細詳其義俱是言寒冷耳故厥逆二字每每互言未嘗分逆為不溫厥為冷也然四肢與手足卻有所分其以四字加於逆字之上者是通指手足臂脛以上言也其以手足二字加於厥逆厥冷等之上及無手足二字者是獨指手足言也既曰不溫即為冷矣尚何異乎仲景所謂諸四逆厥者不可下蓋以四逆為四肢通冷厥為手足獨冷而臂與脛以上不冷耳不謂逆厥有不溫與冷之別也故又曰厥者手足逆冷是也以逆冷二字釋厥字足見逆即厥厥即逆也故字書曰厥者逆也雖然逆厥雖俱為寒冷而卻有陰陽之殊焉熱極而成逆厥者陽極似陰也寒極而成逆厥者獨陰無陽也陽極似陰固用寒藥獨陰無陽固用熱藥仲景以四逆散寒藥治四逆一條此陽極似陰之四逆也其無四逆湯熱藥治四逆之條者安知其非本有而失之乎且四逆湯之名由四肢之冷而立也今以四逆湯治手足厥冷豈非逆厥之不異乎既以四逆為四肢不溫厥為手足獨冷何故不名治厥之藥為四厥湯乎成氏於四逆散治四逆條下謂四逆為熱邪所為及於明理論謂四逆非虛寒之證矣至於少陰病死證二條下卻謂四逆為寒甚君此者得不自悖其説乎是知四逆亦猶厥之有寒有熱固不可謂四逆專為熱邪所作也但四肢通冷比之手足獨冷則有間爾故仲景曰少陰病吐利躁煩四逆者死又曰少陰病四逆惡寒而身蜷脈不至不煩而躁者死又曰少陰病吐利手足厥冷煩躁欲死者吳茱萸湯主之此三條者二為死一為可治雖通由諸證兼見而然然死者以四逆言可治者以厥冷言則亦可見四逆與手足厥冷之有輕重淺深矣夫四肢通冷其病為重手足獨冷其病為輕雖婦人小子亦能知之成氏乃謂厥甚於逆何邪若能知四逆厥之所以異者在於獨指手足言與兼指臂脛以上言則不勞創為不溫與冷之曲説而自然貫通矣嘔吐乾嘔噦咳逆辨嘗讀成無己傷寒明理論有曰嘔者有聲者也俗謂之啘吐者吐出其物也故有乾嘔而無干吐是以於嘔則曰食谷欲嘔及吐則曰飲食入口即吐則嘔吐之有輕重可知矣又曰噦者俗謂之咳逆是也余竊疑之於是即仲景傷寒論以考其是非以訂其説夫傷寒論曰嘔曰吐曰乾嘔曰噦者至多曰咳逆者則二而止也因類聚而觀之夫嘔者東垣所謂聲物兼出者也吐者東垣所謂物出而無聲者也至若干嘔與噦皆聲出而無物也東垣但以噦該之而無干嘔之論夫乾嘔與噦其所異者果何在哉微甚而已矣故仲景於乾嘔則皆平易言之於噦則曰太陽中風火劫發汗後久則譫語甚者至噦又曰陽明中風若不屎腹滿加噦者不治又曰大吐大下之極虛復極汗出者因得噦雖亦間有似平易言者然比之言乾嘔則徑庭矣竊又思之乾嘔與噦東垣視為一仲景視為二由為一而觀之固皆聲之獨出者也由為二而觀之則乾嘔乃噦之微噦乃乾嘔之甚乾嘔者其聲輕小而短噦者其聲重大而長長者雖有微甚之分蓋一證也今成氏乃以嘔為有聲與乾嘔混而無別又以噦為咳逆若此者余未之能從也夫仲景以聲物兼出而名為嘔以物獨出而名為吐以聲獨出而名為乾嘔惟其嘔兼聲物故無物而聲空鳴者乃謂之干干猶空也至於吐則是必有物矣其可謂之干乎仲景於嘔字上加一干字所以別夫嘔為聲物兼出者耳成氏乃以嘔為獨有聲而同乎乾嘔得不有失仲景措辭之本意歟仲景曰嘔家有癰膿者不可治嘔盡膿自愈夫謂之嘔盡膿其可以嘔為獨有聲乎至於曰得湯則嘔得食而嘔飲食嘔貪水者必嘔之類亦不可以嘔為獨有聲矣又少陰病下利用通脈四逆湯一條其所敘諸證既有乾嘔之文何下文加減法中又曰嘔者加生薑乎設仲景果以嘔為獨有聲則不當又立乾嘔之名矣觀其既曰嘔又曰乾嘔則其義之殊別也詎不著明也哉且仲景嘗言欲嘔矣又言欲吐矣未嘗言欲乾嘔欲噦也夫欲之為義將出未出而預有所覺之辭也夫將出未出而預覺者惟有形之物則然無形之聲則不然也有形之物將出乎胸膈之間則雖未出而亦可以前知若無形之聲則不能前知其將出必待夫既出而後可知也嘔與吐主有形之物言故可謂之欲乾嘔與噦主無形之聲言故不可謂之欲成氏引食谷欲嘔飲食入口即吐二句而謂嘔吐有輕重其意蓋以嘔言欲而為輕吐言即而為重安知言欲不言欲者本為有形無形設不為輕重設也果如其説則得湯則嘔得食而嘔心中溫溫欲吐氣逆欲吐之語不出於仲景乎又引俗謂之啘一句以證嘔夫啘與噦蓋字異而音義俱同者也以之證嘔亦疏矣雖然以嘔與吐較之吐輕於嘔以吐與乾嘔較之乾嘔輕於吐然三者亦各自有輕重不可定拘也但以嘔吐乾嘔與噦而較則噦之為重必非三者之比矣故太素曰木陳者其葉落病深者其聲噦夫噦雖亦有輕而可治重而不可治者然病至於噦則其治也終不易矣且夫咳逆俗以吃逆與吃忒呼之然咳逆二字僅見傷寒論首辨脈平脈法中其六經病篇及汗下可否諸篇皆無所有其所有者噦也後人因見六經病篇及汗下可否諸篇但有噦而無咳逆遂謂噦即咳逆而曰咳逆者噦逆之名籲斯言也孫真人倡於前朱奉議成無己和於後由是噦與咳逆之名義紊矣金匱要略曰病人胸中似喘不喘似嘔不嘔似噦不噦徹心中憒憒然無奈者生薑半夏湯主之乾嘔噦若手足厥者橘皮湯主之噦逆者橘皮竹茹湯主之觀此則仲景所謂噦逆但指與乾嘔同類者言何嘗指咳逆言乎咳逆噦逆不同咳逆言其聲之才發而遽止雖發止相續有至數十聲者然而短促不長有若咳嗽之咳然故曰咳逆噦逆則言其似欲嘔物以出而無所出但聲之濁惡長而有力直至氣盡而後止非如干嘔之輕而不甚故曰噦逆二者皆由氣之逆上而作故俱以逆言之孫真人乃以噦逆當咳逆何邪彼言傷寒者雖以辨脈平脈法之咳逆與咳逆上氣視為吃忒然安知其不為咳而氣逆之病乎故今不敢定其必為吃忒也金匱要略曰病咳逆寸口脈微而數此為肺癰咳逆上氣時時唾濁但坐不得眠皂莢丸主之咳而上氣喉中水雞聲射干麻黃湯主之此三條者皆是咳而氣逆之病豈可以咳逆專為吃忒哉今傷寒家本有吃忒而論中六經病篇及汗下可否諸篇卻無者必亡逸於散落之餘耳雖吃忒為六經病篇及汗下可否諸篇所不言決不可以噦為吃忒之咳逆亦不可以噦為咳而氣逆之咳逆也或曰吾子以要略所謂噦逆非吃忒病何後人治吃忒者用橘皮竹茹湯而愈乎余曰橘皮竹茹湯辛甘之劑也有散有緩有和有補其噦逆吃忒病雖不同而為邪正之氣怫鬱擾亂所致則一故用焉而皆愈雖然噦逆吃忒以一藥同治則可以一體同視則不可中風辨人有卒暴僵仆或偏枯或四肢不舉或不知人或死或不死者世以中風呼之而方書亦以中風治之余嘗考諸內經則曰風者百病之始也又曰風者百病之長也至其變化乃為他病無常方又曰風者善行而數變又曰風之傷人也或為寒熱或為熱中或為寒中或為癘風或為偏枯或為風也其卒暴僵仆不知人四肢不舉者並無所論止有偏枯一語而已及觀千金方則引岐伯曰中風大法有四一曰偏枯二曰風痱三曰風懿四曰風痹解之者曰偏枯者半身不隨風痱者身無痛四肢不收風懿者奄忽不知人風痹者諸痹類風狀金匱要略中風篇曰寸口脈浮而緊緊則為寒浮則為虛寒虛相搏邪在皮膚浮者血虛絡脈空虛賊邪不瀉或左或右邪氣反緩正氣即急正氣引邪喎僻不遂邪在於絡肌膚不仁邪在於經即重不勝邪入於腑即不識人邪入於臟舌即難言口吐涎沫由是觀之知卒暴僵仆不知人偏枯四肢不舉等證固為因風而致者矣故用大小續命西州續命排風八風等諸湯散治之及近代劉河間李東垣朱彥修三子者出所論始與昔人異矣河間曰中風癱瘓者非謂肝木之風實甚而卒中之亦非外中於風由乎將息失宜心火暴甚腎水虛衰不能制之則陰虛陽實而熱氣怫鬱心神昏冒筋骨不用而卒倒無所知也多因喜怒思悲恐五志有所過極而卒中者由五志過極皆為熱甚故也俗云風者言末而忘其本也東垣曰中風者非外來風邪乃本氣病也凡人年逾四旬氣衰之際或因憂喜忿怒傷其氣者多有此疾壯歲之時無有也若肥盛則間有之亦是形盛氣衰而如此彥修曰西北氣寒為風所中誠有之矣東南氣溫而地多濕有風病者非風也皆濕土生痰痰生熱熱生風也三子之論河間主乎火東垣主乎氣彥修主於濕反以風為虛象而大異於昔人矣籲昔人也三子也果孰是歟果孰非歟以三子為是昔人為非則三子未出之前固有從昔人而治愈者矣以昔人為是三子為非則三子已出之後亦有從三子而治愈者矣故不善讀其書者往往致亂以豫觀之昔人三子之論皆不可偏廢但三子以相類中風之病視為中風而立論故使後人狐疑而不能決殊不知因於風者真中風也因於火因於氣因於濕者類中風而非中風也三子所論者自是因火因氣因濕而為暴病暴死之證與風何相干哉如內經所謂三陰三陽發病為偏枯痿易四肢不舉亦未嘗必因於風而後能也夫風火氣濕之殊望聞問切之異豈無所辨乎辨之為風則從昔人以治辨之為火氣濕則從三子以治如此庶乎析理明而用法當矣惟其以因火因氣因濕之證強因風而合論之所以真偽不分而名實相紊若以因火因氣因濕證分出之則真中風病彰矣所謂西北有中風東南無中風者其然歟否歟中暑中熱辨潔古云靜而得之為中暑動而得之為中熱中暑者陰證中熱者陽證東垣云避暑熱於深堂大廈得之者名曰中暑其病必頭痛惡寒身形拘急肢節疼痛而煩心肌膚火熱無汗為房室之陰寒所遏使周身陽氣不得伸越大順散主之若行人或農夫於日中勞役得之者名曰中熱其病必苦頭痛發躁熱惡熱捫之肌膚大熱必大渴引飲汗大泄無氣以動乃為天熱外傷肺氣蒼朮白虎湯主之竊謂暑熱者夏之令也大行於天地之間人或勞動或飢餓元氣虧乏不足以御天令亢極於是受傷而為病名曰中暑亦名曰中熱其實一也今乃以動靜所得分之何哉夫中暑熱者固多在勞役之人勞役則虛虛則邪入邪入則病不虛則天令雖亢亦無由以傷之彼避暑於深堂大廈得頭疼惡寒等證者蓋亦傷寒之類耳不可以中暑名之其所以煩心與肌膚火熱者非暑邪也身中陽氣受陰寒所遏而作也既非暑邪其可以中暑名乎苟欲治之則辛溫輕揚之劑發散可也夫大順散一方甘草最多乾薑杏仁肉桂次之除肉桂外其三物皆炒者原其初意本為冒暑伏熱引飲過多脾胃受濕嘔吐水穀不分臟腑不調所立故甘草乾薑皆經火炒熟又肉桂而非桂枝蓋溫中藥也內有杏仁不過取其能下氣耳若以此藥治靜而得之之證吾恐不能解反增內煩矣今之世俗往往不明類曰夏月陰氣在內大順散為必用之藥籲其誤也不亦甚歟夫陰氣非寒氣也蓋夏月陽氣發散於外而陰氣則在內耳豈空視陰氣為寒氣而用溫熱之藥乎陰果為寒何以夏則飲水乎其蒼朮白虎湯雖宜用然亦豈可視為通行之藥必參之治暑諸方隨所見之證而用之然後合理若夫所謂靜而得之之證雖當暑月即非暑病宜分出之勿使後人有似同而異之惑積熱沉寒論人之所藉以生者氣也氣者何陰陽是也夫陰與陰可以和而平可以乖而辵否善攝與辵否吉凶於是乎歧之夫惟攝之不能以皆善也故偏寒偏熱之病始莫逃於乖辵否之餘矣雖然寒也熱也苟未至於甚粗工為之而不難設熱積而寒沉良工猶弗能以為計況其下乎奈之何俗尚顓蒙恪持方藥愈投愈盛迷不之反豈知端本澄源中含至理執其樞要衆妙俱呈且以積熱言之始而涼和次而寒取寒取不愈則因熱而從之從之不愈則技窮矣由是苦寒頻歲而弗停又以沉寒言之始而溫和次而熱取熱取不愈則因寒而從之從之不愈則技窮矣由是辛熱比年而弗止嗟夫苦寒益深而積熱彌熾辛熱大過而苦寒愈滋苟非大聖慈仁明垂樞要生也孰從而全之經曰謂寒之而熱者取之陰熱之而寒者取之陽所謂求其屬也屬也者其樞要之所存乎斯旨也王太僕知之故曰益火之原以消陰翳壯水之主以制陽光又曰取心者不必齊以熱取腎者不必齊以寒但益心之陽寒亦通行強腎之陰熱之猶可籲混乎千言萬語之間殆猶和璧之在璞也其寶久湮豈過焉者石之而弗鑿乎余僭得而推衍之夫偏寒偏熱之病其免者固千百之一二而積熱沉寒亦恐未至於數見也然而數見者得非粗工不知求屬之道不能防微杜漸遂致滋蔓難圖以成之歟夫寒之而熱者徒知以寒治熱而不知熱之不衰者由乎真水之不足也熱之而寒者徒知以熱治寒而不知寒之不衰者由乎真火之不足也不知真水火不足泠以寒熱藥治之非惟臟腑習熟藥反見化於其病而有者弗去無者弗至矣故取之陰所以益腎水之不足而使其制夫心火之有餘取之陽所以益心火之不足而使其勝夫腎水之有餘也其指水火也屬猶主也謂心腎也求其屬者言水火不足而求之於心腎也火之原者陽氣之根即心是也水之主者陰氣之根即腎是也非謂火為心而原為肝水為腎而主為肺也寒亦益心熱亦強腎此太僕達至理於規矩準繩之外而非迂士麴生之可以跂及矣彼迂士麴生不明真水火於寒熱之病有必制必勝之道但謂藥未勝病久遠期之是以恪守方藥愈投愈盛卒至殞滅而莫之悟嗚呼悲夫余見積熱沉寒之治每蹈於覆轍也因表而出之以勸瀉南方補北方論難經七十五篇曰經言東方實西方虛瀉南方補北方何謂也然金木水火土當更相平東方木也西方金也木欲實金當平之火欲實水當平之土欲實木當平之金欲實火當平之水欲實土當平之東方者肝也則知肝實西方者肺也則知肺虛瀉南方火補北方水南方火火者木之子也北方水水者木之母也水勝火子能令母實母能令子虛故瀉火補水欲令金不得平木也經曰不能治其虛何問其餘此之謂也余每讀至此未嘗不嘆夫越人之得經旨也而悼夫後人之失經旨也先哲有言凡讀書不可先看注解且將經文反覆而詳味之待自家有新意卻以注解參校庶乎經意昭然而不為他説所蔽若先看注解則被其説橫吾胸中自家竟無新意矣余平生佩服此訓所益甚多且如難經此篇其言周備純正足以為萬世法後人紛紛之論其可憑乎夫實則瀉之虛則補之此常道也實則瀉其子虛則補其母亦常道也人皆知之今肝實肺虛乃不瀉肝而瀉心此則人亦知之至於不補肺補脾而補腎此則人不能知惟越人知之耳夫子能令母實母能令子虛以常情觀之則曰心火實致肝木亦實此子能令母實也脾土虛致肺金亦虛此母能令子虛也心火實固由自旺脾土虛乃由肝木製之法當瀉心補脾則肝肺皆平矣越人則不然其子能令母實子謂火母謂木固與常情無異其母能令子虛母謂水子謂木則與常情不同矣故曰水者木之母也子能令母實一句言病因也母能令子虛一句言治法其意蓋曰火為木之子子助其母使之過分而為病矣今將何以處之惟有補水瀉火之治而已夫補水者何謂也蓋水為木之母若補水之虛使力可勝火火勢退而水勢亦退此則母能虛子之義所謂不治之治也此虛字與精氣奪則虛之虛不同彼虛謂耗其真而致虛此虛謂抑其過而欲虛之也若曰不然則母能令子虛一句將歸之於脾肺乎既歸於脾肺今何不補脾乎夫五行之道其所畏者畏所克耳今火大旺水大虧火何畏乎惟其無畏何愈旺而莫能制苟非滋水以求勝之孰能勝也水勝火三字此越人寓意處當細觀之勿輕忽也雖瀉火補水並言然其要又在於補水耳後人乃曰獨瀉火而不用補水又曰瀉火即是補水得不大違越人與經之意乎若果不用補水經必不言補北方越人必不言補水矣雖然水不虛而火獨暴旺者固不必補水亦可也若先因水虛而致火旺者不補水可乎水虛火旺而不補水則藥至而暫息藥過而復作將積年纍月無有窮已安能絶其根哉雖苦寒之藥通為抑陽扶陰不過瀉火邪而已終非腎臟本藥不能以滋養北方之真陰也欲滋真陰舍地黃黃柏之屬不可也且夫肝之實也其因有二心助肝肝實之一因也肺不能制肝肝實之二因也肺之虛也其因亦有二心克肺肺虛之一因也脾受肝克而不能生肺肺虛之二因也今補水而瀉火火退則木氣削又金不受克而制木東方不實矣金氣得平又土不受克而生金西方不虛矣若以虛則補母言之肺虛則當補脾豈知肝勢正盛剋土之深雖每日補脾安能敵其正盛之勢哉縱使土能生金金受火克亦所得不償所失矣此所以不補土而補水也或疑木旺補水恐水生木而木愈旺故聞獨瀉火不補水之論欣然而從之殊不知木已旺矣何待生乎況水之虛雖峻補尚不能復其本氣安有餘力生木哉若能生木則能勝火矣或又謂補水者欲其不食於母也不食於母則金氣還矣豈知火剋金土不生金金之虛已極尚不能自給水雖欲食之何所食乎若如此則金虛不由於火之克土之不生而由於水之食耳豈理也哉縱水不食金金亦未必能復常也金不得平木一句多一不字所以瀉火補水者正欲使金得平木也不字當刪去不能治其虛何問其餘虛指肺虛而言也瀉火補水使金得平木正所謂能治其虛不補土不補金乃瀉火補水使金自平此法之巧而妙者苟不能曉此法而不能治此虛則不須問其他必是無能之人矣故曰不能治其虛何問其餘若夫上文所謂金木水火土更相平之義不勞解而自明茲故弗具也夫越人亞聖也論至於此敢不斂衽但恨説者之斁蝕之故辨五郁論治五郁之法嘗聞之王太僕矣其釋內經曰木鬱達之謂吐之令其條達也火鬱發之謂汗之令其疏散也土鬱奪之謂下之令無壅礙也金鬱泄之謂滲泄解表利小便也水鬱折之謂抑之制其沖逆也太僕此説之後靡不宗之然愚則未能快然於中焉嘗細觀之似猶有可言且折之一句較之上四句尢為難曉因有反覆經文以求其至按內經帝曰郁之甚者治之奈何岐伯曰木鬱達之火鬱發之土鬱奪之金鬱泄之水鬱折之然調其氣過者折之以其畏也所謂泄之總十三句通為一章當分三節自帝曰止木鬱折之九句為一節治郁法之問答也然調其氣一句為一節治郁之餘法也過者折之以其畏也所謂泄之三句為一節調氣之餘法也夫五法者經雖為病由五運之郁所致而立然擴而充之則未常不可也且凡病之起也多由乎郁郁者滯而不通之義或因所乘而為郁或不因所乘而本氣自郁皆郁也豈惟五運之變能使然哉郁既非五運之變可拘則達之發之奪之泄之折之之法固可擴焉而充之矣可擴而充其應變不窮之理也歟姑陳於左木鬱達之達者通暢之也如肝性急怒氣逆胠脅或脹火時上炎治以苦寒辛散而不愈者則用升發之藥加以厥陰報使而從治之又如久風入中為飧泄及不因外風之入而清氣在下為飧泄則以輕揚之劑舉而散之凡此之類皆達之之法也王氏謂吐之令其條達為木鬱達之東垣謂食塞胸中食為坤土胸為金位金主殺伐與坤土俱在於上而旺於天金能剋木故肝木生髮之氣伏於地下非木鬱而何吐去上焦陰土之物木得舒暢則鬱結去矣此木鬱達之也竊意王氏以吐訓達此不能使人無疑者以為肺金盛而抑制肝木歟則瀉肺氣舉肝氣可矣不必吐也以為脾胃濁氣下流而少陽清氣不升歟則益胃升陽可矣不必吐也雖然木鬱固有吐之之理今以吐字總該達字則是凡木鬱皆當用吐矣其可乎哉至於東垣所謂食塞肺分為金與土旺於上而剋木又不能使人無疑者夫金之剋木五行之常道固不待夫物傷而後能也且為物所傷豈有反旺之理若曰吐去其物以伸木氣乃是反為木鬱而施治非為食傷而施治矣夫食塞胸中而用吐正內經所謂其高者因而越之之義耳恐不勞引木鬱之説以汨之也火鬱發之發者汗之也升舉之也如腠理外閉邪熱怫鬱則解表取汗以散之又如龍火鬱甚於內非苦寒降沉之劑可治則用升浮之藥佐以甘溫順其性而從治之使勢窮則止如東垣升陽散火湯是也凡此之類皆發之之法也土鬱奪之奪者攻下也劫而衰之也如邪熱入胃用鹹寒之劑以攻去之又如中滿腹脹濕熱內甚其人壯氣實者則攻下之其或勢盛而不能頓除者則劫奪其勢而使之衰又如濕熱為痢有非力輕之劑可治者則或攻或劫以致其平凡此之類皆奪之之法也金鬱泄之泄者滲泄而利小便也疏通其氣也如肺金為腎水上原金受火鑠其令不行原鬱而滲道閉矣宜肅清金化滋以利之又如肺氣膹滿胸憑仰息非利肺氣之劑不足以疏通之凡此之類皆泄之之法也王氏謂滲泄解表利小便為金鬱泄之夫滲泄利小便固為泄金鬱矣其解表二字莫曉其意得非以人之皮毛屬肺其受邪為金鬱而解表為泄之乎竊謂如此則凡筋病便是木鬱肉病便是土鬱耶此二字未當於理今刪去且解表間於滲泄利小便之中是滲泄利小便為二治矣若以滲泄為滋肺生水以利小便為直治膀胱則直治膀胱既責不在肺何為金鬱乎是亦不通故余易之曰滲泄而利小便也水鬱折之折者制御也伐而挫之也漸殺其勢也如腫脹之病水氣淫溢而滲道以塞夫水之所不勝者土也今土氣衰弱不能制之故反受其侮治當實其脾土資其運化俾可以制水而不敢犯則滲道達而後愈或病勢既旺非上法所能遽制則用泄水之藥以伐而挫之或去菀陳莝開鬼門潔淨府三治備舉迭用以漸平之王氏所謂抑之制其沖逆正欲折挫其泛濫之勢也夫實土者守也泄水者攻也兼三治者廣略而決勝也守也攻也廣略也雖俱為治水之法然不審病者之虛實久近淺深雜焉而妄施治之其不傾踣者寡矣且夫五郁之病固有法以治之矣然邪氣久客正氣必損今邪氣雖去正氣豈能遽平哉苟不平調正氣使各安其位復其常於治郁之餘則猶未足以盡治法之妙故又曰然調其氣苟調之而其氣猶或過而未服則當益其所不勝以制之如木過者當益金金能制木則木斯服矣所不勝者所畏者也故曰過者折之以其畏也夫制物者物之所欲也制於物者物之所不欲也順其欲則喜逆其欲則惡今逆之以所惡故曰所謂瀉之王氏以咸瀉腎酸瀉肝之類為説未盡厥旨雖然自調其氣以下蓋經之本旨故余推其義如此若擴充為應變之用則不必盡然也二陽病論經曰二陽之病發心脾有不得隱曲女子不月釋之者謂男子則脾受之而味不化故少精女子則心受之而血不流故不月分心脾為男女各受立説竊獨謂不然夫二陽陽明也胃與大腸之脈也腸胃有病心脾受之發心脾猶言延及於心脾也雖然脾胃為合胃病而及脾理固宜矣大腸與心本非合也今大腸而及心何哉蓋胃為受納之府大腸為傳化之府食入於胃濁氣歸心飲入於胃輸精於脾者以胃之能納大腸之能化耳腸胃既病則不能受不能化心脾何所資乎心脾既無所資則無所運化而生精血矣故腸胃有病心脾受之則男為少精女為不月矣心脾當總言男女不當分説至隱曲不月方可分説耳者如釋者之言則男之精獨資於脾而不資於心女之血獨資於心而不資於脾有是理耶蓋男女之精血皆由五臟六腑之相養而後成可謂之男精資於脾女血資於心乎經本曰男女皆有心脾之病但在男子則隱曲之不利在女子則月事之不來耳煎厥論內經曰陽氣者煩勞則張精絶闢積於夏使人煎厥目盲不可以視耳閉不可以聽潰潰乎若壞都汩汩乎不可止王氏注曰張筋脈䐜脹也精絶精氣竭絶也既傷腎氣又損膀胱故當夏時使人煎厥斯乃房之患也既盲目視又閉耳聽則志意心神筋骨腸胃潰潰乎若壞汩汩乎煩悶而不可止愚竊味夫經其旨昭然若無待於解者何注釋之乖遠如此乎請重釋之夫陽氣者人身和平之氣也煩勞者凡過於動作皆是也張主也謂亢極也精陰氣也闢積猶積疊謂怫鬱也衣褶謂之襞積者亦取積疊之義也積水之奔散曰潰都猶堤防也汩汩水流而不止也夫充於身者一氣而已本無異類也即其所用所病而言之於是乎始有異名耳故平則為正亢則為邪陽氣則因其和以養人而名之及其過動而張亦即陽氣亢極而成火耳陽盛則陰衰故精絶水不制火故亢火鬱積之甚又當夏月火旺之時故使人煩熱之極若煎迫然而氣逆上也火炎氣逆故目盲耳閉而無所用此陽極欲絶故其精敗神去不可復生若堤防之崩壞而所儲之水奔散滂流莫能以遏之矣夫病至於此是壞之極矣王氏乃因不曉都字之義遂略去此字而謂之若壞其可乎哉又以此病純為房患以張為筋脈䐜脹以汩汩為煩悶皆非是八味丸用澤瀉論張仲景八味丸用澤瀉寇宗奭本草衍義云不過接引桂附等歸就腎經別無他意而王海藏韙之愚謂八味丸以地黃為君而以余藥佐之非止為補血之劑蓋兼補氣也氣者血之母東垣所謂陽旺則能生陰血者此也若果專為補腎而入腎經則地黃山茱萸白茯苓牡丹皮皆腎經之藥固不待夫澤瀉之接引而後至也其附子官桂雖非足少陰經本藥然附子乃右腎命門之藥況浮中沉無所不至又為通行諸經引用藥官桂能補下焦相火不足是亦右腎命門藥也易老亦曰補腎用肉桂然則桂附亦不待夫澤瀉之接引而後至矣唯乾山藥雖獨入手太陰經然其功亦能強陰且手太陰為足少陰之上原原既有滋流豈無益夫其用地黃為君者大補血虛不足與補腎也用諸藥佐之者山藥之強陰益氣山茱萸之強陰益精而壯元氣白茯苓之補陽長陰而益氣牡丹皮之瀉陰火而治神志不足澤瀉之養五臟益氣力起陰氣而補虛損五勞桂附之補下焦火也由此觀之則余之所謂兼補氣者非臆説也且澤瀉也雖曰咸以瀉腎乃瀉腎邪非瀉腎之本也故五苓散用澤瀉者詎非瀉腎邪乎白茯苓亦伐腎邪即所以補正耳是則八味丸之用澤瀉者非他蓋取其瀉腎邪養五臟益氣力起陰氣補虛損五勞之功而已寇氏何疑其瀉腎而為接引桂附等之説乎且澤瀉固能瀉腎然從於諸補藥群衆之中雖欲瀉之而力莫能施矣故當歸從於參耆則能補血從於大黃牽牛則能破血從於桂附茱萸則熱從於大黃芒硝則寒此非無定性也奪於群衆之勢而不得不然也雖然或者又謂八味丸以附子為少陰之嚮導其補自是地黃為主蓋取其健脾走下之性以行地黃之滯可致遠耳竊意如此則地黃之滯非附子不能及下矣然錢仲陽六味地黃丸豈有附子乎夫八味丸蓋兼陰火不足者設六味地黃丸則惟陰虛者用之也小便原委論或問余曰靈樞經曰水穀者常並居胃中成糟粕而俱下於大腸而成下焦滲而俱下濟泌別汁循下焦而滲入膀胱焉王冰曰水液自回腸泌別汁滲入膀胱之中胞氣化之而為溺以泄出也楊介云水穀自小腸盛受於闌門以分別也其水則滲灌入於膀胱上口而為溲便詳以上三説則小便即泌別之水液滲入膀胱以出者也素問則曰飲入於胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱則小便又似水飲精微之氣上升脾肺運化而後成者也彼此不同將何所憑乎余曰憑夫理耳且夫溲溺者果何物耶水而已矣水之下流其性則然也故飲入於胃其精氣雖不上升其飲之本固不能上升體也既不能上升則豈可謂小便獨為氣化所成者哉惟其不能上升者必有待於能上升者為之先導故素問又曰膀胱者津液藏焉氣化則能出矣且水者氣之子氣者水之母氣行則水行氣滯則水滯或者又謂小便純由泌別不由運化蓋不明此理故也雖然膀胱固曰津液之府至於受盛津液則又有胞而居膀胱之中焉故素問曰胞移熱於膀胱靈樞經曰膀胱之胞薄以濡類纂曰膀胱者胞之室且夫胞之居於膀胱也有上口而無下口津液既盛於胞無由自出必因乎氣化而後能漸浸潤於胞外積於胞下之空處遂為溺以出於前陰也素問所謂膀胱津液藏焉者蓋舉膀胱以該胞也若曰胞下無空處則人溺急時至廁安能即出乎夫惟積滿胞下空處而不可再容故急急則至廁即出矣或言胞有下口而無上口或言胞上下皆有口或言胞有小竅而為注泄之路不亦妄歟內傷余議當觀夫東垣李氏所著內外傷辨有曰外傷風寒客邪有餘之病當瀉不當補內傷飲食勞役不足之病當補不當瀉自此論一出而天下後世始知內外之傷有所別而仲景之法不可例用矣其惠也不其大哉雖然夷考其言猶或有可疑者不敢諛佞僭用條之如曰夫飲食勞倦傷而內熱者乃陰火乘其坤土之位故內熱以及於胸中也又曰內經有云勞者溫之損者溫之惟宜溫藥以補元氣而瀉火邪內經曰溫能除大熱故治之必溫藥乃可耳又曰飲者無形之氣傷之則宜發汗利小便使上下分消其濕此飲謂酒也食者有形之物傷之則宜損其谷其次莫如消導若此者皆不能使人無疑者也謹按素問調經論篇云帝曰陰虛生內熱奈何岐伯曰有所勞倦形氣衰少穀氣不盛上焦不行下脘不通胃氣熱熱氣熏胸中故內熱嗟夫此內傷之説之原乎請釋其義如左夫人身之陰陽有以表裡言者有以上下之分言者有以氣血言者有以身前身後言者有以臟腑言者有以升降呼吸之氣言者余如動靜語默起居之類甚多不必悉舉此所謂陰虛之陰其所指與數者皆不同蓋勞動之過則陽和之氣皆亢極而化為火矣況水穀之味又少入是故陽愈盛而陰愈衰也此陰虛之陰蓋指身中之陰氣與水穀之味耳或以下焦陰分為言或以腎水真陰為言皆非也夫有所勞役者過動屬火也形氣衰少者壯火食氣也穀氣不盛者勞傷元氣則少食而氣衰也上焦不行者清陽不升也下脘不通者濁陰不降也夫胃受水穀故清陽升而濁陰降以傳化出入滋榮一身也今胃不能納而穀氣衰少則清無升而濁無降矣故曰上焦不行下脘不通然非謂絶不行不通也但比之平常無病時則謂之不行不通耳上不行下不通則鬱矣鬱則少火皆成壯火而胃居上焦下脘兩者之間故胃氣熱熱則上炎故熏胸中而為內熱也東垣所謂勞役形體所謂飲食失節而致熱者此言正與調經論篇之旨相合固宜引此段經文於內外傷辨以為之主而乃反不引此卻謂陰火乘土位故內熱及胸中此不能無疑者也夫陰火二字素問靈樞難經未嘗言而東垣每每言之素問止有七節之膀中有小心二句而劉守真推其為命門屬火不屬水引仙經心為君火腎為相火之説以為之證然亦不以陰火名之是則名為陰火者其東垣始歟竊意內熱之作非皆陰火也但氣有郁則成熱耳雖曰心為君火君不主令然素問所敘諸病之屬熱者甚衆皆君火病也豈君火不能為病而直欲純歸之於陰火乎至真要大論云勞者溫之損者益之夫勞則動之太過而神不寧矣故溫之溫也者養也溫之者所以調其食飲適其起居澄心息慮從容以待其真氣之復常也禮記所謂柔色以溫之此溫字正與此同或以藥扶助之亦養也今東垣乃以溫為溫涼之溫謂宜溫藥以補元氣而瀉火邪又易損者益之為損者溫之又以溫能除大熱為內經所云而遍考內經並無此語此亦不能無疑者也然溫藥之補元氣瀉火邪者亦惟氣溫而味甘者斯可矣蓋溫能益氣甘能助脾而緩火故元氣復而火邪熄也夫宜用溫藥以為內傷不足之治則可以為勞者溫之之注則不可陰陽應象論所謂形不足者溫之以氣其溫字亦是滋養之義非指溫藥也夫形不足乃陽虛而不充也氣者藥之氣也藥有氣厚氣薄味厚味薄味厚者屬陰而滋精氣厚者屬陽而滋形今以藥之氣厚者滋陽不兼形乎故曰形不足者溫之以氣雖以藥溫養之亦未嘗不兼乎調食飲適起居與澄心息慮也溫字固其二意然終不可視為溫涼之溫苟以補之除之抑之舉之散之等語比類而觀焉則其義自著矣夫金木水火土運於天地也則無形質之可觀其麗於地則有形質矣金木土水者有形有質者也火者有形而質不實者也酒性雖體熱同於水今東垣乃謂飲者無形之氣此亦不能無疑者也既待發汗利小便以去之其可謂之無形之氣乎且勞倦傷飲食傷二者雖俱為內傷然不可混而為一難經所謂飲食勞倦則傷脾者蓋謂脾主飲食而四肢亦屬脾故飲食失節勞役四肢皆能傷於脾耳非謂二者同類而無辨也夫勞倦傷飲食傷雖與風寒暑濕有餘之病不同然飲食傷又與勞倦傷不同勞倦傷誠不足也飲食傷尢當於不足之中分其有餘不足也何也蓋飢餓不飲食與飲食太過雖皆是失節然必明其有兩者之分方盡其理節也者何無不及無太過之中有道也夫飢餓不飲食者胃氣空虛此為不足固失節也飲食自倍而停滯者胃氣受傷此不足之中兼有餘亦失節也以受傷言則不足以停滯言則有餘矣惟其不足故補益惟其有餘故消導亦有物滯氣傷必補益消導兼行者亦有物暫滯而氣不甚傷宜消導獨行不須補益者亦有既停滯不復自化不須消導但當補益或亦不須補益者潔古枳朮丸東垣橘皮枳朮丸木香枳朮丸之類雖曰消導固有補益之意存乎其間其他如木香分氣丸導氣枳實丸大枳殼丸之類雖無補益然施之於物暫滯氣不甚傷者豈不可哉但不宜視為通行之藥耳且所滯之物非枳朮丸之力所能去者亦安可泥於消導而不知變乎故備急丸煮黃丸感應丸瓜蒂散等之推逐者潔古東垣亦未嘗委之而弗用也故善將兵者攻亦當守亦當不善者則宜攻而守宜守而攻其敗也非兵之罪用兵者之罪耳觀乎此則知消導補益推逐之理矣若夫勞倦傷則純乎補益固不待議雖東垣丁寧告戒然世人猶往往以苦寒之劑望除勞倦傷之熱及其不愈而反甚自甚而至危但曰病勢已極藥不能勝耳醫者病者主病者一委之天命皆懵然不悟其為妄治之失也嗚呼仁人君子能不痛心也哉夫東垣先哲之出類者也奚敢輕議但恨其白璧微瑕而或貽後人差毫釐謬千里之患故不得不僣逾耳知我者其鑑之外傷內傷所受經言異同論客或難豫曰素問陰陽應象論云天之邪氣感則害人五臟水穀之寒熱感則害人六腑太陰陽明論云犯賊風虛邪者陽受之食飲不節起居不時者陰受之陽受之則入六腑陰受之則入五臟兩説正相反願聞其解余復之曰此所謂似反而不反者也夫感天之邪氣犯賊風虛邪外傷有餘之病也感水穀寒熱食飲不節內傷不足之病也二者之傷腑臟皆嘗受之但隨其所從所發之處而為病耳不可以此兩説之異而致疑蓋並行不相悖也讀者當合而觀之其旨斯盡若曰不然請以諸處所論證之金匱真言論曰風觸五臟邪氣發病八正神明論曰夫八正之虛邪以身之虛而逢天之虛兩虛相感其氣至骨入則五臟傷靈樞經曰五臟之中風又曰東風傷人內舍於肝南風傷人內舍於心西南風傷人內舍於脾西風傷人內舍於肺北風傷人內舍於腎觀乎此則天之邪氣固傷五臟矣靈樞又曰邪之中人也無有常中於陰則溜於腑又曰虛邪之中人也始從皮膚以入其傳自絡脈而經而輸而伏沖之脈以至於腸胃又曰東北風傷人內舍於大腸西北風傷人內舍於小腸東南風傷人內舍於胃觀乎此則天之邪氣豈不傷六腑乎素問曰飲食自倍腸胃乃傷觀乎此則水穀寒熱固傷六腑矣靈樞又曰形寒寒飲則傷肺難經曰飲食勞倦則傷脾觀乎此則水穀寒熱豈不傷五臟乎至於地之濕氣亦未必專害皮肉筋脈而不能害臟腑邪氣水穀亦未必專害臟腑而不能害皮肉筋脈也但以邪氣無形臟主藏精氣故以類相從而多傷腑水穀有形腑主傳化物故因其所有而多傷腑濕氣浸潤其性緩慢其入人也以漸其始也自足故從下而上從淺而深而多傷於皮肉筋脈耳孰謂濕氣全無及於臟腑之理哉至若起居不時一語蓋勞役所傷之病不繫上文異同之義故不之及也
